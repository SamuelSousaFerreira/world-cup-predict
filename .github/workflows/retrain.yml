name: Retreinar modelos (diário)

# Baixa os dados públicos mais recentes, reconstrói as features, retreina os
# 6 modelos e commita os artefatos atualizados (models/ e team_state.json).
# Como o app no Streamlit Cloud é servido a partir deste repositório, cada push
# dispara um redeploy automático — então o app passa a usar os dados do dia.

on:
  schedule:
    # 09:00 UTC = 06:00 no horário de Brasília. A base é atualizada de hora em
    # hora, então de manhã já há resultados frescos. Ajuste o horário se quiser.
    - cron: "0 9 * * *"
  workflow_dispatch: {} # permite rodar manualmente pelo botão "Run workflow"

# Necessário para o workflow conseguir commitar de volta no repositório.
permissions:
  contents: write

concurrency:
  group: retrain
  cancel-in-progress: false

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Retreinar (baixa dados frescos, gera features e salva modelos)
        run: python src/train.py

      - name: Commitar artefatos atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models data/processed/team_state.json
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos modelos — nada a commitar."
          else
            # Há dados novos: atualiza a marca de build no entry-script para
            # forçar o Streamlit Cloud a recarregar o app.py (e não servir o
            # código antigo em cache após um commit só de dados).
            STAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            sed -i -E "s/^APP_BUILD = .*/APP_BUILD = \"${STAMP}\"/" app.py
            git add app.py
            git commit -m "chore: retreino diário com dados de $(date -u +%F)"
            git push
          fi
